name: Build EVE DPS EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install nuitka pywin32 zstandard ordered-set

      - name: Build EXE with Nuitka
        run: |
          python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --output-filename=EVE_DPS.exe `
            --windows-icon-from-ico=EVE_DPS_icon.ico `
            --enable-plugin=tk-inter `
            --assume-yes-for-downloads `
            --include-module=wave `
            --include-module=struct `
            --include-module=tempfile `
            --include-module=winsound `
            EVE_DPS.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3-build-${{ github.run_number }}
          name: "EVE DPS v1.3 - Build ${{ github.run_number }}"
          files: EVE_DPS.exe
          body: "v1.3 자동 빌드 (Nuitka)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
